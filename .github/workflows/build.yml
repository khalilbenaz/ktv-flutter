name: build

# Build automatique macOS (Apple Silicon) + Windows (x64) à chaque tag "v*".
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: macos
            out: build/macos/Build/Products/Release
            asset: KTV-macos-arm64.zip
          - os: windows-latest
            target: windows
            out: build/windows/x64/runner/Release
            asset: KTV-windows-x64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Récupérer ffmpeg
        shell: bash
        run: bash tool/fetch_ffmpeg.sh

      - name: Dépendances
        run: flutter pub get

      - name: Tests
        run: flutter test

      - name: Build
        run: flutter build ${{ matrix.target }} --release

      - name: Zip (macOS)
        if: runner.os == 'macOS'
        run: |
          APP=$(ls -d "${{ matrix.out }}"/*.app | head -1)
          echo "Packaging $APP"
          ditto -c -k --keepParent "$APP" "${{ matrix.asset }}"

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "${{ matrix.out }}\*" -DestinationPath "${{ matrix.asset }}" -Force

      - name: Attacher à la release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}

      - name: Upload artefact (runs manuels)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  # Build Android (APK). Pas de fetch_ffmpeg : les binaires desktop (ffmpeg,
  # cloudflared) ne servent pas sur mobile → APK bien plus léger. Les fonctions
  # enregistrement / restream / rediffusion .ts sont masquées sur Android.
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable
          cache: true
      - name: Dépendances
        run: flutter pub get
      - name: Build APK (par ABI)
        run: flutter build apk --release --split-per-abi
      - name: Renommer les APK
        run: |
          cd build/app/outputs/flutter-apk
          cp app-arm64-v8a-release.apk KTV-android-arm64.apk
          cp app-armeabi-v7a-release.apk KTV-android-arm32.apk
      - name: Attacher à la release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/KTV-android-arm64.apk
            build/app/outputs/flutter-apk/KTV-android-arm32.apk
      - name: Upload artefact (runs manuels)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: KTV-android
          path: build/app/outputs/flutter-apk/KTV-android-*.apk
