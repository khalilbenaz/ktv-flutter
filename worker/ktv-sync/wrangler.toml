name = "ktv-sync"
main = "src/index.js"
compatibility_date = "2024-11-01"

# KV : stocke le blob chiffré par compte (sync:{slug}) + cache token→slug.
kv_namespaces = [
  { binding = "SYNC", id = "4c3d514e1b1d433d92f1bcc7577c0143" }
]

# D1 : registre des comptes (visibilité). Écriture best-effort côté Worker.
[[d1_databases]]
binding = "DB"
database_name = "ktv-sync"
database_id = "3a1025f3-917d-46cb-abdc-3f1b86c03d9a"

# Secret (ne pas committer) : wrangler secret put TRAKT_CLIENT_ID
